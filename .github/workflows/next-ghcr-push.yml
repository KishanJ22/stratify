name: Push NextJS Docker Image to GHCR

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        type: environment
        required: true

jobs:
  stratify-ui:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get package version
        id: package-version
        run: echo "VERSION=$(jq -r .version apps/ui/stratify-ui/package.json)" >> "$GITHUB_OUTPUT"

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ui/stratify-ui/Dockerfile
          push: true
          tags: ghcr.io/kishanj22/stratify/stratify-ui:${{ steps.package-version.outputs.VERSION }}
          build-args: |
            NEXT_PUBLIC_API_PROXY_URL=${{ secrets.NEXT_PUBLIC_API_PROXY_URL }}
            STRATIFY_API_URL=${{ secrets.STRATIFY_API_URL }}
            NEXT_PUBLIC_AUTH_PROXY_URL=${{ secrets.NEXT_PUBLIC_AUTH_PROXY_URL }}
            STRATIFY_AUTH_API_URL=${{ secrets.STRATIFY_AUTH_API_URL }}
